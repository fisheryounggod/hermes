<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Noto+Serif+SC:wght@400;700&family=JetBrains+Mono:wght@400;500&display=swap');

  :root {
    --bg: #1a1a2e;
    --card-bg: #16213e;
    --accent: #e94560;
    --accent2: #0f3460;
    --text: #eaeaea;
    --text-muted: #a0a0a0;
    --gold: #f5c518;
    --green: #4ecca3;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    background: var(--bg);
    font-family: 'DM Sans', 'PingFang SC', sans-serif;
    color: var(--text);
    padding: 48px 40px;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 40px;
  }
  .header .week-tag {
    display: inline-block;
    background: var(--accent);
    color: white;
    font-size: 20px;
    font-weight: 700;
    padding: 6px 24px;
    border-radius: 20px;
    margin-bottom: 16px;
  }
  .header h1 {
    font-family: 'Noto Serif SC', serif;
    font-size: 42px;
    font-weight: 700;
    color: white;
    margin-bottom: 8px;
  }
  .header .subtitle {
    font-size: 22px;
    color: var(--text-muted);
  }

  /* Vocab Grid */
  .vocab-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    margin-bottom: 32px;
  }

  /* Vocab Card */
  .vocab-card {
    background: var(--card-bg);
    border-radius: 16px;
    padding: 28px 32px;
    border-left: 4px solid var(--accent);
    position: relative;
    transition: transform 0.2s;
  }
  .vocab-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(233,69,96,0.15);
  }
  .vocab-card .en {
    font-family: 'DM Sans', sans-serif;
    font-size: 32px;
    font-weight: 700;
    color: var(--gold);
    margin-bottom: 8px;
  }
  .vocab-card .zh {
    font-size: 24px;
    color: var(--text);
    margin-bottom: 12px;
    line-height: 1.4;
  }
  .vocab-card .example {
    font-size: 18px;
    color: var(--text-muted);
    font-style: italic;
    line-height: 1.5;
    border-top: 1px solid rgba(255,255,255,0.08);
    padding-top: 12px;
  }

  /* Phrase Section */
  .phrase-section {
    background: linear-gradient(135deg, var(--card-bg), #1a2a4a);
    border-radius: 16px;
    padding: 28px 32px;
    margin-bottom: 32px;
    border: 1px solid rgba(233,69,96,0.2);
  }
  .phrase-section h3 {
    font-size: 22px;
    color: var(--accent);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .phrase-section h3::before {
    content: '💬';
  }
  .phrase-list {
    list-style: none;
  }
  .phrase-list li {
    font-size: 20px;
    color: var(--text);
    padding: 12px 0;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    line-height: 1.5;
  }
  .phrase-list li:last-child {
    border-bottom: none;
  }
  .phrase-list li .num {
    display: inline-block;
    width: 28px;
    height: 28px;
    background: var(--accent);
    color: white;
    border-radius: 50%;
    text-align: center;
    line-height: 28px;
    font-size: 14px;
    font-weight: 700;
    margin-right: 12px;
  }

  /* Footer */
  .footer {
    text-align: center;
    padding-top: 20px;
    border-top: 1px solid rgba(255,255,255,0.08);
    color: var(--text-muted);
    font-size: 18px;
  }
  .footer span {
    color: var(--green);
    font-weight: 500;
  }

  /* Tips box */
  .tips-box {
    background: rgba(78,204,163,0.08);
    border: 1px solid rgba(78,204,163,0.2);
    border-radius: 12px;
    padding: 20px 28px;
    margin-bottom: 24px;
  }
  .tips-box h4 {
    color: var(--green);
    font-size: 20px;
    margin-bottom: 10px;
  }
  .tips-box p {
    color: var(--text-muted);
    font-size: 18px;
    line-height: 1.6;
  }
</style>
</head>
<body>
{{CONTENT}}
</body>
</html>
