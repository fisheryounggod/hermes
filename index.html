<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hermes 文件中心</title>
<style>
:root {
  --bg: #f0f2f8; --surface: #fff; --surface2: #f8f9fc; --border: #e8eaf0;
  --text: #1a1a2e; --text2: #6668a0; --text3: #99a0c0;
  --accent: #6c7ee1; --accent2: #a5b4fc; --accent-bg: #eef0fe;
  --radius: 14px; --shadow: 0 2px 16px rgba(30,35,70,0.08);
}
[data-theme="dark"] {
  --bg: #12131e; --surface: #1a1b2e; --surface2: #22233a; --border: #2d2f4a;
  --text: #e8eaf6; --text2: #99a0c0; --text3: #6668a0;
  --accent: #8b93f0; --accent2: #5a63d4; --accent-bg: #1e2040;
  --shadow: 0 2px 16px rgba(0,0,0,0.3);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: 'PingFang SC','Microsoft YaHei',sans-serif; background:var(--bg); color:var(--text); line-height:1.6; transition: 0.2s; }
a { color:inherit; text-decoration:none; }

header { background: linear-gradient(135deg,#6c7ee1 0%,#8b93f0 50%,#a78bfa 100%); color:white; padding:36px 24px; position:relative; overflow:hidden; }
header::before { content:''; position:absolute; inset:0; background-image:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none'%3E%3Cg fill='%23ffffff' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E"); }
.header-inner { position:relative; max-width:1060px; margin:0 auto; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:16px; }
.header-left h1 { font-size:1.7em; font-weight:800; letter-spacing:-0.02em; margin-bottom:4px; }
.stats-bar { display:flex; gap:20px; font-size:0.85em; opacity:0.9; }
.dark-toggle { background:rgba(255,255,255,0.2); border:none; color:white; padding:9px 18px; border-radius:10px; cursor:pointer; font-size:0.88em; backdrop-filter:blur(8px); transition:background 0.2s; }
.dark-toggle:hover { background:rgba(255,255,255,0.32); }

.container { max-width:1060px; margin:0 auto; padding:24px 20px 60px; }

.search-wrap { margin:16px 0 12px; display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
#searchInput { flex:1; min-width:200px; padding:10px 16px; border:1.5px solid var(--border); border-radius:10px; font-size:0.9em; background:var(--surface); color:var(--text); outline:none; transition:border-color 0.2s; }
#searchInput:focus { border-color:var(--accent); }
.filter-wrap { display:flex; gap:8px; flex-wrap:wrap; }
.filter-btn { padding:6px 14px; border:1.5px solid var(--border); border-radius:8px; background:var(--surface); color:var(--text2); font-size:0.8em; cursor:pointer; transition:all 0.15s; }
.filter-btn.active { background:var(--accent); color:white; border-color:var(--accent); }

.loading { text-align:center; padding:60px 0; color:var(--text3); font-size:0.9em; }
.loading::after { content:''; display:inline-block; width:20px; height:20px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.8s linear infinite; margin-left:10px; vertical-align:middle; }
@keyframes spin { to{transform:rotate(360deg)} }

.grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:16px; }
.dir-card { background:var(--surface); border-radius:var(--radius); box-shadow:var(--shadow); border:1px solid var(--border); padding:20px; transition:box-shadow 0.2s,transform 0.2s; }
.dir-card:hover { box-shadow:0 4px 24px rgba(30,35,70,0.12); transform:translateY(-2px); }
.dir-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; padding-bottom:10px; border-bottom:1px solid var(--border); }
.dir-title { font-weight:700; font-size:0.95em; display:flex; align-items:center; gap:6px; }
.file-count { background:var(--accent-bg); color:var(--accent); font-size:0.72em; padding:2px 8px; border-radius:20px; font-weight:600; }
.file-list { list-style:none; max-height:280px; overflow-y:auto; }
.file-list li { padding:5px 0; font-size:0.82em; display:flex; align-items:center; gap:6px; }
.file-list li a { color:var(--text2); flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.file-list li a:hover { color:var(--accent); }
.file-ext { font-size:0.7em; padding:1px 5px; border-radius:4px; background:var(--surface2); color:var(--text3); flex-shrink:0; }
.file-ext.img { background:#fef3c7; color:#92400e; }
.file-ext.pdf { background:#fee2e2; color:#991b1b; }
.file-ext.py  { background:#d1fae5; color:#065f46; }
.file-ext.md  { background:#e0e7ff; color:#3730a3; }

footer { text-align:center; padding:30px; color:var(--text3); font-size:0.8em; border-top:1px solid var(--border); margin-top:40px; }
footer a { color:var(--accent); }

@media(max-width:600px){ .grid{grid-template-columns:1fr;} .header-inner{flex-direction:column;} }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="header-left">
      <h1>📦 Hermes 文件中心</h1>
      <div class="stats-bar">
        <span id="totalCount">— 文件</span>
        <span id="lastUpdate">—</span>
      </div>
    </div>
    <button class="dark-toggle" onclick="toggleTheme()" id="themeBtn">🌙 深色模式</button>
  </div>
</header>

<div class="container">
  <div class="search-wrap">
    <input type="text" id="searchInput" placeholder="🔍 搜索文件…" oninput="filterAll()">
    <div class="filter-wrap" id="filterWrap"></div>
  </div>
  <div id="loading" class="loading">正在加载文件列表</div>
  <div class="grid" id="grid" style="display:none"></div>
  <footer>由 <a href="https://github.com/fisheryounggod/hermes" target="_blank">GitHub API</a> 驱动 · 实时更新</footer>
</div>

<script>
const OWNER = 'fisheryounggod';
const REPO  = 'hermes';
const TREE_API = `https://api.github.com/repos/${OWNER}/${REPO}/git/trees/main?recursive=1`;
const TOKEN = '';

let allFiles = [];
let activeDir = 'all';

const stored = localStorage.getItem('hermes-theme');
if (stored === 'dark') document.documentElement.setAttribute('data-theme','dark');
function toggleTheme() {
  const d = document.documentElement;
  const is = d.getAttribute('data-theme') === 'dark';
  d.setAttribute('data-theme', is ? '' : 'dark');
  localStorage.setItem('hermes-theme', is ? '' : 'dark');
  document.getElementById('themeBtn').textContent = is ? '🌙 深色模式' : '☀️ 浅色模式';
}
if (stored === 'dark') document.getElementById('themeBtn').textContent = '☀️ 浅色模式';

// ── 获取完整文件树（一次 API 调用） ──
async function loadFiles() {
  try {
    const headers = { 'Accept': 'application/vnd.github.v3+json' };
    if (TOKEN) headers['Authorization'] = `Bearer ${TOKEN}`;
    const r = await fetch(TREE_API, { headers });
    if (r.status === 403) {
      document.getElementById('loading').textContent = '❌ API 速率超限，请稍后再试（每小时最多 60 次请求）';
      return;
    }
    if (!r.ok) throw new Error(r.status);
    const data = await r.json();
    // tree[].path = 文件路径，type = 'blob'
    allFiles = data.tree.filter(item => item.type === 'blob');
    renderDirs();
    document.getElementById('loading').style.display = 'none';
    document.getElementById('grid').style.display = 'grid';
    document.getElementById('totalCount').textContent = `${allFiles.length} 文件`;
    document.getElementById('lastUpdate').textContent = new Date().toLocaleString('zh-CN');
    buildFilters();
  } catch(e) {
    document.getElementById('loading').textContent = '❌ 加载失败: ' + e.message;
  }
}

// ── 按目录分组 ──
function getDirs() {
  const map = {};
  for (const f of allFiles) {
    const parts = f.path.split('/');
    const dir = parts.length > 1 ? parts[0] : '_root';
    if (!map[dir]) map[dir] = [];
    map[dir].push(f);
  }
  return map;
}

// ── 过滤按钮 ──
function buildFilters() {
  const dirs = getDirs();
  const wrap = document.getElementById('filterWrap');
  const allBtn = document.createElement('button');
  allBtn.className = 'filter-btn' + (activeDir === 'all' ? ' active' : '');
  allBtn.textContent = '全部';
  allBtn.onclick = () => { activeDir = 'all'; filterAll(); updateBtns(); };
  wrap.appendChild(allBtn);
  for (const d of Object.keys(dirs).sort()) {
    const btn = document.createElement('button');
    btn.className = 'filter-btn' + (activeDir === d ? ' active' : '');
    btn.textContent = `📁 ${d} (${dirs[d].length})`;
    btn.onclick = () => { activeDir = d; filterAll(); updateBtns(); };
    wrap.appendChild(btn);
  }
}

function updateBtns() {
  document.querySelectorAll('.filter-btn').forEach(b => {
    const isAll = b.textContent === '全部';
    const active = isAll ? activeDir === 'all' : activeDir === b.textContent.split(' ')[1];
    b.className = 'filter-btn' + (active ? ' active' : '');
  });
}

function filterAll() { renderDirs(document.getElementById('searchInput').value.trim().toLowerCase()); }

function renderDirs(search='') {
  const dirs = getDirs();
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  const targets = activeDir === 'all' ? Object.keys(dirs) : [activeDir];
  for (const dir of targets.sort()) {
    const files = dirs[dir].filter(f => {
      if (!search) return true;
      const q = search.toLowerCase();
      return f.path.toLowerCase().includes(q);
    });
    if (!files.length) continue;
    const card = document.createElement('div');
    card.className = 'dir-card';
    const hdr = document.createElement('div');
    hdr.className = 'dir-header';
    hdr.innerHTML = `<span class="dir-title">📁 ${dir}</span><span class="file-count">${files.length}</span>`;
    card.appendChild(hdr);
    const ul = document.createElement('ul');
    ul.className = 'file-list';
    for (const f of files.sort((a,b) => a.path.localeCompare(b.path))) {
      const ext = f.path.split('.').pop().toLowerCase();
      const cls = ['png','jpg','gif','svg','webp'].includes(ext) ? 'img'
                : ext === 'pdf' ? 'pdf' : ext === 'py' ? 'py' : ext === 'md' ? 'md' : '';
      const li = document.createElement('li');
      const url = `https://raw.githubusercontent.com/${OWNER}/${REPO}/main/${encodeURIComponent(f.path)}`;
      li.innerHTML = `<span class="file-ext ${cls}">${ext}</span><a href="${url}" target="_blank" title="${f.path}">${f.path.split('/').pop()}</a>`;
      ul.appendChild(li);
    }
    card.appendChild(ul);
    grid.appendChild(card);
  }
}

loadFiles();
</script>
</body>
</html>
